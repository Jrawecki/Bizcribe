services:
  db:
    image: postgres:16
    container_name: bizcribe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bizcribe_local
    ports:
      - "5432:5432"
    volumes:
      - bizcribe-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bizcribe_local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bizcribe-pgdata:
